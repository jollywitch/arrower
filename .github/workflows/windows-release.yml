name: Windows Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARROWER_BUILD_TESTS=ON

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --target arrower arrower_tests

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Stage application
        shell: msys2 {0}
        run: |
          set -euo pipefail
          dist="dist/arrower-${{ github.ref_name }}-windows-x64"
          mkdir -p "$dist"
          cp build/arrower.exe "$dist/"
          cp config.json "$dist/"
          windeployqt "$dist/arrower.exe" --release --no-translations --compiler-runtime

          runtime_dlls=(
            libgcc_s_seh-1.dll
            libstdc++-6.dll
            libwinpthread-1.dll
          )

          for dll in "${runtime_dlls[@]}"; do
            source_path="${MINGW_PREFIX}/bin/${dll}"
            if [[ ! -f "$source_path" ]]; then
              echo "Missing MinGW runtime DLL: $source_path" >&2
              exit 1
            fi
            cp -f "$source_path" "$dist/"
          done

      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path "dist/arrower-${{ github.ref_name }}-windows-x64/*" -DestinationPath "dist/arrower-${{ github.ref_name }}-windows-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dist = (Resolve-Path "dist/arrower-$version-windows-x64").Path
          $outputDir = (Resolve-Path "dist").Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DSourceDir=$dist" `
            "/DOutputDir=$outputDir" `
            "packaging/windows/arrower.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arrower-${{ github.ref_name }}-windows-x64
          path: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: arrower ${{ github.ref_name }}
          draft: ${{ startsWith(github.ref_name, 'test-') }}
          prerelease: ${{ startsWith(github.ref_name, 'test-') }}
          files: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
