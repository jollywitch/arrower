name: Windows Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARROWER_BUILD_TESTS=ON

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --target arrower arrower_tests

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Stage application
        shell: msys2 {0}
        run: |
          set -euo pipefail
          dist="dist/arrower-${{ github.ref_name }}-windows-x64"
          mkdir -p "$dist"
          cp build/arrower.exe "$dist/"
          cp config.json "$dist/"
          windeployqt "$dist/arrower.exe" --release --no-translations --compiler-runtime

      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path "dist/arrower-${{ github.ref_name }}-windows-x64/*" -DestinationPath "dist/arrower-${{ github.ref_name }}-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arrower-${{ github.ref_name }}-windows-x64
          path: dist/arrower-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: arrower ${{ github.ref_name }}
          files: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64/arrower.exe
