name: Windows Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Qt
        uses: jurplel/install-qt-action@v4
        with:
          cache: true
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Set up packaging tools
        shell: pwsh
        run: choco install ninja innosetup -y --no-progress

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARROWER_BUILD_TESTS=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --target arrower arrower_tests

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure

      - name: Stage application
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dist = "dist/arrower-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "build/arrower.exe" $dist
          Copy-Item "config.json" $dist

          windeployqt "$dist/arrower.exe" --release --no-translations --compiler-runtime

          $mingwDlls = @(
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll"
          )
          $packagedDlls = Get-ChildItem $dist -Recurse -Filter "*.dll" | ForEach-Object { $_.Name.ToLowerInvariant() }
          $unexpected = $mingwDlls | Where-Object { $packagedDlls -contains $_ }
          if ($unexpected) {
            throw "MSVC package unexpectedly contains MinGW runtime DLLs: $($unexpected -join ', ')"
          }

          Write-Host "Packaged top-level DLLs:"
          Get-ChildItem $dist -File -Filter "*.dll" | Sort-Object Name | ForEach-Object { $_.Name }

      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path "dist/arrower-${{ github.ref_name }}-windows-x64/*" -DestinationPath "dist/arrower-${{ github.ref_name }}-windows-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dist = (Resolve-Path "dist/arrower-$version-windows-x64").Path
          $outputDir = (Resolve-Path "dist").Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DSourceDir=$dist" `
            "/DOutputDir=$outputDir" `
            "packaging/windows/arrower.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arrower-${{ github.ref_name }}-windows-x64
          path: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: arrower ${{ github.ref_name }}
          draft: ${{ startsWith(github.ref_name, 'test-') }}
          prerelease: ${{ startsWith(github.ref_name, 'test-') }}
          overwrite_files: true
          files: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
