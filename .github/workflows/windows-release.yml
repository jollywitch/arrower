name: Windows Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARROWER_BUILD_TESTS=ON

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --target arrower arrower_tests

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Set up Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Stage application
        shell: msys2 {0}
        run: |
          set -euo pipefail
          dist="dist/arrower-${{ github.ref_name }}-windows-x64"
          mkdir -p "$dist"
          cp build/arrower.exe "$dist/"
          cp config.json "$dist/"
          windeployqt "$dist/arrower.exe" --release --no-translations --compiler-runtime

          declare -A processed=()

          find_mingw_dll() {
            local dll="$1"
            local exact="${MINGW_PREFIX}/bin/${dll}"
            if [[ -f "$exact" ]]; then
              printf '%s\n' "$exact"
              return 0
            fi

            find "${MINGW_PREFIX}/bin" -maxdepth 1 -iname "$dll" -print -quit
          }

          queue_binary() {
            local binary="$1"
            local key
            key="$(cygpath -m "$binary" | tr '[:upper:]' '[:lower:]')"
            if [[ -n "${processed[$key]:-}" ]]; then
              return
            fi
            processed[$key]=queued
            queue+=("$binary")
          }

          queue=()
          while IFS= read -r binary; do
            queue_binary "$binary"
          done < <(find "$dist" -type f \( -iname '*.exe' -o -iname '*.dll' \))

          while ((${#queue[@]})); do
            binary="${queue[0]}"
            queue=("${queue[@]:1}")

            while IFS= read -r dll; do
              dll="${dll//$'\r'/}"
              [[ -n "$dll" ]] || continue

              existing="$(find "$dist" -maxdepth 1 -iname "$dll" -print -quit)"
              if [[ -n "$existing" ]]; then
                queue_binary "$existing"
                continue
              fi

              source_path="$(find_mingw_dll "$dll")"
              if [[ -z "$source_path" ]]; then
                continue
              fi

              echo "Copying runtime dependency: ${dll}"
              cp -f "$source_path" "$dist/"
              queue_binary "$dist/$(basename "$source_path")"
            done < <(x86_64-w64-mingw32-objdump -p "$binary" | sed -n 's/^[[:space:]]*DLL Name: //p')
          done

      - name: Package application
        shell: pwsh
        run: Compress-Archive -Path "dist/arrower-${{ github.ref_name }}-windows-x64/*" -DestinationPath "dist/arrower-${{ github.ref_name }}-windows-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dist = (Resolve-Path "dist/arrower-$version-windows-x64").Path
          $outputDir = (Resolve-Path "dist").Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DSourceDir=$dist" `
            "/DOutputDir=$outputDir" `
            "packaging/windows/arrower.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arrower-${{ github.ref_name }}-windows-x64
          path: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: arrower ${{ github.ref_name }}
          draft: ${{ startsWith(github.ref_name, 'test-') }}
          prerelease: ${{ startsWith(github.ref_name, 'test-') }}
          overwrite_files: true
          files: |
            dist/arrower-${{ github.ref_name }}-windows-x64.zip
            dist/arrower-${{ github.ref_name }}-windows-x64-setup.exe
